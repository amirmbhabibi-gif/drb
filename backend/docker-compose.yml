version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: darugard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: darugard
      POSTGRES_USER: darugard
      POSTGRES_PASSWORD: darugard_secret
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U darugard -d darugard']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: darugard_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
